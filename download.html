<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mys.client version downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #09090b;
            color: #fafafa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>
    <div class="max-w-2xl w-full mx-auto px-6">
        <div class="text-center mb-12">
            <h1 class="text-4xl font-semibold tracking-tight mb-2">mys.client</h1>
            <p class="text-zinc-400">Click the button to copy the script</p>
        </div>
        <div class="glass rounded-3xl p-8 shadow-2xl">
            <div class="flex gap-3">
                <div class="flex-1">
                    <div id="textBox"
                        class="w-full h-48 bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4 text-zinc-200 resize-none focus:outline-none focus:border-violet-500 transition-colors font-mono text-sm overflow-auto"
                    >loadstring(game:HttpGet("http://www.mysclient.lol/v7.5.3"))()</div>
                </div>
                <div class="flex flex-col justify-center">
                    <button
                        id="copyBtn"
                        class="bg-violet-600 hover:bg-violet-500 active:bg-violet-700 transition-all text-white font-medium px-8 py-4 rounded-2xl flex items-center gap-2 shadow-lg shadow-violet-500/30 focus:outline-none focus:ring-4 focus:ring-violet-500/30"
                    >
                        <i class="fa-solid fa-copy"></i>
                        <span>Copy</span>
                    </button>
                </div>
            </div>
            <div id="status" class="mt-6 text-center text-sm font-medium text-emerald-400 opacity-0 transition-opacity"></div>
        </div>
        <p class="text-center text-zinc-500 text-xs mt-8">
            Simple • Clean • Fast
        </p>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/js/all.min.js"></script>
    <script>
        const textBox = document.getElementById('textBox');
        const copyBtn = document.getElementById('copyBtn');
        const status = document.getElementById('status');

        copyBtn.addEventListener('click', async () => {
            const text = textBox.textContent.trim();
           
            if (!text) {
                showStatus("Nothing to copy!", "text-red-400");
                return;
            }
            try {
                await navigator.clipboard.writeText(text);
                showStatus("✓ Copied to clipboard", "text-emerald-400");
               
                copyBtn.innerHTML = `<i class="fa-solid fa-check"></i><span>Copied!</span>`;
                copyBtn.classList.add('!bg-emerald-600', '!shadow-emerald-500/30');
               
                setTimeout(() => {
                    copyBtn.innerHTML = `<i class="fa-solid fa-copy"></i><span>Copy</span>`;
                    copyBtn.classList.remove('!bg-emerald-600', '!shadow-emerald-500/30');
                }, 2000);
            } catch (err) {
                showStatus("Failed to copy", "text-red-400");
            }
        });

        function showStatus(message, colorClass) {
            status.textContent = message;
            status.className = `mt-6 text-center text-sm font-medium transition-opacity ${colorClass}`;
            status.style.opacity = "1";
           
            setTimeout(() => {
                status.style.opacity = "0";
            }, 2500);
        }
    </script>
</body>
</html>

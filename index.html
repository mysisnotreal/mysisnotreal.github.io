<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mys.client</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        mys_client: '#FF2C00',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        * { cursor: none !important; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0A0A0A;
            color: #FF2C00;
            overflow-x: hidden;
            margin: 0;
        }
        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #09090b; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }

        #custom-cursor {
            position: fixed;
            top: 0; left: 0;
            width: 24px;
            height: 24px;
            pointer-events: none;
            z-index: 99999;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: translate(-50%, -50%);
        }
        .cursor-plus {
            position: relative;
            width: 14px;
            height: 14px;
        }
        .cursor-plus::before, .cursor-plus::after {
            content: '';
            position: absolute;
            background-color: #FF2C00;
            box-shadow: 0 0 8px #ffffff;
        }
        .cursor-plus::before {
            width: 100%;
            height: 2px;
            top: 6px;
            left: 0;
        }
        .cursor-plus::after {
            width: 2px;
            height: 100%;
            top: 0;
            left: 6px;
        }

        #vanta-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        #root {
            position: relative;
            z-index: 10;
        }

        .custom-slider-container {
            position: relative;
            width: 100%;
            height: 10px;
            background-color: #1a1a1e;
            border: 1px solid #27272a;
        }
        .custom-slider-fill {
            position: absolute;
            top: 0; left: 0;
            height: 100%;
            background-color: #5C544E;
            transition: width 0.05s linear;
        }
        .custom-slider-input {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
            z-index: 2;
        }
    </style>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="vanta-bg"></div>
    <div id="root"></div>
    
    <div id="custom-cursor">
        <div class="cursor-plus"></div>
    </div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const DISCORD_LINK = "https://discord.gg/3M3q7Dbg3k";
        const OPEN_SCRIPT_LINK = "http://www.mysclient.lol/latest";
        const PREVIEW_YOUTUBE_ID = "iu-zZ-MR7Vk";
        const mys_client_ICON_URL = "https://raw.githubusercontent.com/mysisnotreal/mysisnotreal.github.io/refs/heads/main/images/RedCrossVintage.png";

        const BrowserTab = ({ id, label, icon, isActive, onClick }) => (
            <button
                onClick={() => onClick(id)}
                className={`flex items-center gap-2 px-4 py-2 text-sm font-medium transition-all duration-200 relative ${
                    isActive 
                    ? 'bg-[#18181b] text-mys_client rounded-t-lg border-x border-t border-zinc-800' 
                    : 'text-zinc-500 hover:text-zinc-300'
                }`}
            >
                <i className={`fa-solid ${icon} text-xs`}></i>
                <span>{label}</span>
                {isActive && <div className="absolute -bottom-px left-0 right-0 h-px bg-[#18181b] z-10" />}
            </button>
        );

        const FeatureItem = ({ label, value }) => (
            <div className="flex items-center justify-between py-2 border-b border-zinc-800/50 last:border-0 group">
                <div className="flex items-center gap-3">
                    <div className="w-1.5 h-1.5 rounded-full bg-mys_client/40 group-hover:scale-125 transition-transform"></div>
                    <span className="text-zinc-300 text-sm group-hover:text-white transition-colors">{label}</span>
                </div>
                {value && <span className="text-[10px] font-mono text-zinc-500 bg-zinc-900 px-1.5 py-0.5 rounded border border-zinc-800">{value}</span>}
            </div>
        );

        const FeatureSlider = ({ label, value, min, max, step, onChange }) => {
            const percentage = ((value - min) / (max - min)) * 100;
            return (
                <div className="py-3 border-b border-zinc-800/50 last:border-0 group select-none">
                    <div className="flex justify-between items-center mb-2">
                        <span className="text-zinc-300 text-sm group-hover:text-white transition-colors">{label}</span>
                        <span className="text-xs font-mono text-zinc-400">{value.toFixed(1)}</span>
                    </div>
                    <div className="custom-slider-container">
                        <div className="custom-slider-fill" style={{ width: `${percentage}%` }}></div>
                        <input
                            type="range"
                            min={min}
                            max={max}
                            step={step}
                            value={value}
                            onChange={(e) => onChange(parseFloat(e.target.value))}
                            className="custom-slider-input"
                        />
                    </div>
                </div>
            );
        };

        const DownloadModal = ({ isOpen, onClose }) => {
            const [progress, setProgress] = useState(0);
            const [isFinished, setIsFinished] = useState(false);

            useEffect(() => {
                if (!isOpen) return;
                
                setProgress(0);
                setIsFinished(false);

                const interval = setInterval(() => {
                    setProgress((prev) => {
                        if (prev >= 100) {
                            clearInterval(interval);
                            setIsFinished(true);
                            return 100;
                        }
                        return prev + Math.floor(Math.random() * 5) + 2;
                    });
                }, 100);

                return () => clearInterval(interval);
            }, [isOpen]);

            if (!isOpen) return null;

            return (
                <div
                    onClick={onClose}
                    className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/80 backdrop-blur-sm animate-in"
                >
                    <div
                        onClick={(e) => e.stopPropagation()}
                        className="bg-[#0c0c0e] border border-zinc-800 w-full max-w-md rounded-2xl p-8 shadow-2xl relative"
                    >
                        {!isFinished && (
                            <button onClick={onClose} className="absolute top-4 right-4 text-zinc-500 hover:text-white transition-colors">
                                <i className="fa-solid fa-xmark"></i>
                            </button>
                        )}

                        <div className="text-center space-y-6">
                            <div className="w-20 h-20 bg-mys_client/10 rounded-full flex items-center justify-center mx-auto border border-mys_client/20 overflow-hidden p-3">
                                <img src={mys_client_ICON_URL} alt="mys_client" className="w-full h-full object-contain" />
                            </div>

                            <div className="space-y-2">
                                <h3 className="text-xl font-bold text-white">
                                    {isFinished ? 'Link Ready' : 'Fetching newest version link'}
                                </h3>
                            </div>

                            <div className="space-y-4">
                                <div className="w-full h-2 bg-zinc-900 rounded-full overflow-hidden border border-zinc-800">
                                    <div
                                        className="h-full bg-mys_client shadow-[0_0_15px_rgba(252,202,210,0.5)] transition-all duration-300 ease-out"
                                        style={{ width: `${progress}%` }}
                                    ></div>
                                </div>
                            </div>

                            {isFinished && (
                                <div className="pt-4 animate-in">
                                    <a
                                        href={OPEN_SCRIPT_LINK}
                                        target="_blank"
                                        rel="noopener noreferrer"
                                        className="block w-full py-4 bg-mys_client text-[#09090b] font-bold rounded-xl hover:opacity-90 transition-all shadow-lg shadow-mys_client/20 text-center"
                                    >
                                        Continue
                                    </a>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('home');
            const [isDownloadModalOpen, setIsDownloadModalOpen] = useState(false);

            useEffect(() => {
                const cursor = document.getElementById('custom-cursor');
                const moveCursor = (e) => {
                    cursor.style.left = e.clientX + 'px';
                    cursor.style.top = e.clientY + 'px';
                };
                window.addEventListener('mousemove', moveCursor);
                return () => window.removeEventListener('mousemove', moveCursor);
            }, []);

            return (
                <div className="min-h-screen relative flex flex-col">
                    <DownloadModal isOpen={isDownloadModalOpen} onClose={() => setIsDownloadModalOpen(false)} />

                    <main className="px-6 pt-16 pb-20 relative flex-1">
                        <div className="w-full max-w-6xl mx-auto mt-8 mb-20 bg-[#09090b]/80 backdrop-blur-md rounded-xl border border-zinc-800 shadow-2xl overflow-hidden flex flex-col">
                            
                            {/* Browser Header */}
                            <div className="bg-[#0c0c0e]/90 border-b border-zinc-800 px-4 pt-3 flex items-center justify-between">
                                <div className="flex items-center gap-4">
                                    <div className="flex gap-2 mr-4">
                                        <div className="w-3 h-3 rounded-full bg-zinc-800" />
                                        <div className="w-3 h-3 rounded-full bg-zinc-800" />
                                        <div className="w-3 h-3 rounded-full bg-zinc-800" />
                                    </div>
                                    <div className="flex gap-1">
                                        <BrowserTab id="home" label="Home" icon="fa-house" isActive={activeTab === 'home'} onClick={setActiveTab} />
                                        <BrowserTab id="versions" label="Versions" icon="fa-bolt" isActive={activeTab === 'versions'} onClick={setActiveTab} />
                                    </div>
                                </div>
                                <div className="pb-3">
                                    <a href={DISCORD_LINK} target="_blank" rel="noopener noreferrer" 
                                       className="flex items-center gap-2 bg-mys_client/10 hover:bg-mys_client/20 text-mys_client px-3 py-1.5 rounded-md text-xs font-semibold transition-colors border border-mys_client/20">
                                        <i className="fa-brands fa-discord"></i>
                                        <span>Join Community</span>
                                    </a>
                                </div>
                            </div>

                            {/* URL Bar */}
                            <div className="bg-[#18181b]/90 px-4 py-2 border-b border-zinc-800 flex items-center gap-3">
                                <div className="flex gap-2 text-zinc-600 text-xs">
                                    <i className="fa-solid fa-arrow-left cursor-pointer hover:text-zinc-400"></i>
                                    <i className="fa-solid fa-arrow-right cursor-pointer hover:text-zinc-400"></i>
                                    <i className="fa-solid fa-rotate-right cursor-pointer hover:text-zinc-400 ml-1"></i>
                                </div>
                                <div className="flex-1 bg-zinc-900/50 rounded-md py-1 px-3 text-xs text-zinc-500 font-mono flex items-center gap-2 border border-zinc-800">
                                    <i className="fa-solid fa-lock text-[10px] text-mys_client"></i>
                                    <span>mys.client/{activeTab}</span>
                                </div>
                            </div>

                            <div className="p-8 min-h-[600px] bg-transparent relative">
                                {activeTab === 'home' && (
                                    <div className="space-y-12 pb-16 animate-in">
                                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
                                            <div className="space-y-6">
                                                <div className="flex items-start gap-4">
                                                    <img src={mys_client_ICON_URL} alt="mys_client" className="w-32 h-32 object-contain mt-1" />
                                                    <h2 className="text-3xl font-bold text-white leading-tight">
                                                        mys.client <br/>
                                                        <span className="text-mys_client">Made By Cheaters For Cheaters.</span>
                                                    </h2>
                                                </div>
                                                <p className="text-zinc-400 leading-relaxed">
                                                    mys.client is the #1 mic up and mic up 17+ script, using security features to make your experience undetected, and smooth while playing. It avoids the usual detection paths that other scripts rely on, reducing exposure to common anti-cheat checks while keeping performance stable and behavior consistent.
                                                </p>
                                                <div className="flex flex-col sm:flex-row gap-4 pt-4">
                                                    <button
                                                        onClick={() => setIsDownloadModalOpen(true)}
                                                        className="px-8 py-3 bg-mys_client text-[#09090b] font-bold rounded-lg hover:opacity-90 transition-opacity shadow-lg shadow-mys_client/10 text-center"
                                                    >
                                                        Open Script!
                                                    </button>
                                                    <a href={DISCORD_LINK} target="_blank" rel="noopener noreferrer" 
                                                       className="px-8 py-3 bg-zinc-900/50 text-zinc-300 font-bold rounded-lg border border-zinc-800 hover:border-zinc-700 transition-colors text-center inline-block">
                                                        Join Discord
                                                    </a>
                                                </div>
                                            </div>
                                            <div className="relative w-full aspect-video rounded-xl overflow-hidden border border-zinc-800 shadow-2xl bg-zinc-900/40 group">
                                                <iframe 
                                                    className="w-full h-full" 
                                                    src={`https://www.youtube.com/embed/${PREVIEW_YOUTUBE_ID}?autoplay=0&controls=1&rel=0`} 
                                                    frameBorder="0" 
                                                    allowFullScreen
                                                ></iframe>
                                            </div>
                                        </div>

                                        {/* Changelog */}
                                        <div className="bg-[#0c0c0e]/60 border border-zinc-800/50 rounded-lg overflow-hidden flex flex-col">
                                            <div className="px-5 py-3 border-b border-zinc-800/50 bg-zinc-900/20 flex items-center justify-between">
                                                <div className="flex items-center gap-3">
                                                    <i className="fa-solid fa-terminal text-mys_client text-xs"></i>
                                                    <span className="text-[10px] font-mono text-zinc-300 uppercase tracking-[0.2em]">Live Changelog</span>
                                                </div>
                                                <div className="flex gap-1.5">
                                                    <div className="w-2 h-2 rounded-full bg-zinc-800"></div>
                                                    <div className="w-2 h-2 rounded-full bg-zinc-800"></div>
                                                    <div className="w-2 h-2 rounded-full bg-zinc-800"></div>
                                                </div>
                                            </div>
                                            <div className="p-6 space-y-3 font-mono">
                                                <div className="space-y-2">
                                                    <div className="flex gap-4 group">
                                                        <span className="text-mys_client font-bold text-xs select-none">[+]</span>
                                                        <span className="text-zinc-300 text-xs">First Look / 3/27/2025</span>
                                                    </div>
                                                </div>
                                                <div className="pt-4 border-t border-zinc-800/30">
                                                    <span className="text-zinc-600 text-[10px] italic">End of logs... waiting for updates.</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
